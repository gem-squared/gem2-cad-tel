# CAD Trust Engine Lite — production compose
#
# Single-service mode: integrates with a host-level reverse proxy
# (Caddy / nginx / Traefik) instead of bundling its own.
#
# The host proxy reverse-proxies its public domain to 127.0.0.1:8501.
# Example /etc/caddy/Caddyfile snippet:
#
#     cad-tel.gemsquared.ai {
#         reverse_proxy localhost:8501
#     }
#
# Audit DB persists in the named volume `audit_data` across compose down/up.

services:
  streamlit:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: cad-trust:latest
    container_name: cad-trust-streamlit
    restart: unless-stopped
    # Loopback-only binding — host Caddy is the only public entrypoint.
    # Prevents accidental direct exposure on the public IP.
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - audit_data:/data
    environment:
      GEM2_VISION_AUDIT_DB: /data/audit.sqlite
    # Memory cap — paddleocr + opencv inference can spike; OOM-killing this
    # container keeps the host's other tenants alive
    mem_limit: 2g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s   # paddleocr first-call model dl can take 1-2 min
      retries: 3

volumes:
  # audit_data persists audit.sqlite across compose down/up cycles
  audit_data:
